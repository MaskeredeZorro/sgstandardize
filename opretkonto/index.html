<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Nexus PMO - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#1e293b', 900: '#0f172a' },
                        brand: { 500: '#00485d', 600: '#003a4a', 700: '#002b38' }, // Salling Blue variants
                        salling: { blue: '#00485d', grey: '#9496a4', orange: '#fce4b3' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">
</head>

<body
    class="bg-gray-100 dark:bg-slate-900 text-gray-800 dark:text-gray-100 min-h-screen flex items-center justify-center font-sans py-12 px-4 sm:px-6 lg:px-8">

    <div
        class="max-w-md w-full space-y-8 bg-white dark:bg-slate-800 p-8 rounded-xl shadow-2xl border-t-4 border-brand-500 relative z-10">
        <div>
            <div class="flex justify-center mb-4">
                <div
                    class="bg-brand-50 text-brand-600 p-4 rounded-full shadow-inner dark:bg-slate-700 dark:text-brand-400">
                    <span class="material-symbols-outlined text-4xl">person_add</span>
                </div>
            </div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 dark:text-white">
                Create Account
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
                Join your team on Nexus PMO
            </p>
        </div>
        <form class="mt-8 space-y-6" onsubmit="signupApp.handleSignUp(event)">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="salaryNo"
                        class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Salary No. (6
                        digits)</label>
                    <input id="salaryNo" name="salaryNo" type="text" required pattern="\d{6}" maxlength="6"
                        class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 dark:border-slate-600 placeholder-gray-500 text-gray-900 dark:text-white dark:bg-slate-700 focus:outline-none focus:ring-brand-500 focus:border-brand-500 focus:z-10 sm:text-sm transition-colors"
                        placeholder="e.g. 123456">
                </div>
                <div>
                    <label for="password"
                        class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Password</label>
                    <input id="password" name="password" type="password" required minlength="15"
                        class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 dark:border-slate-600 placeholder-gray-500 text-gray-900 dark:text-white dark:bg-slate-700 focus:outline-none focus:ring-brand-500 focus:border-brand-500 focus:z-10 sm:text-sm transition-colors"
                        placeholder="Secure password (min 15 chars)" title="Must be at least 15 characters">
                </div>
            </div>

            <div>
                <button type="submit" id="btnSubmit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-md text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors shadow-md shadow-brand-500/30 active:scale-95">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <span
                            class="material-symbols-outlined text-brand-500 group-hover:text-brand-400">app_registration</span>
                    </span>
                    Sign Up
                </button>
            </div>

            <p id="errorMsg" class="text-sm text-red-500 text-center font-bold mt-2 min-h-[20px]"></p>

            <div class="text-center mt-4">
                <a href="../index"
                    class="font-medium text-brand-600 hover:text-brand-500 dark:text-brand-400 dark:hover:text-brand-300 text-sm transition-colors">
                    Already have an account? Sign in here
                </a>
            </div>
        </form>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute -top-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-brand-500/5 blur-[100px]"></div>
        <div class="absolute -bottom-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-500/10 blur-[100px]"></div>
    </div>

    <script>
        // --- Supabase Config ---
        const SUPABASE_URL = 'https://jdzkblgzpjazoyaehzjl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Py_d0iK3ruDy5BSZAFD1-g_48fz6iZE';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const signupApp = {
            async handleSignUp(e) {
                e.preventDefault();

                const salaryNo = document.getElementById('salaryNo').value.trim();
                const password = document.getElementById('password').value;
                const errorEl = document.getElementById('errorMsg');
                const btn = document.getElementById('btnSubmit');

                errorEl.innerText = '';
                errorEl.className = "text-sm text-yellow-500 text-center font-bold mt-2 min-h-[20px]";

                if (!/^\d{6}$/.test(salaryNo)) {
                    errorEl.innerText = "Salary No. must be 6 digits.";
                    errorEl.className = "text-sm text-red-500 text-center font-bold mt-2 min-h-[20px]";
                    return;
                }
                if (password.length < 15) {
                    errorEl.innerText = "Password must be at least 15 characters.";
                    errorEl.className = "text-sm text-red-500 text-center font-bold mt-2 min-h-[20px]";
                    return;
                }

                btn.disabled = true;
                errorEl.innerText = "Creating account...";

                const email = salaryNo + '@standardize.dk';

                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            role: 'employee' // Force role to employee
                        }
                    }
                });

                btn.disabled = false;

                if (error) {
                    errorEl.innerText = error.message;
                    errorEl.className = "text-sm text-red-500 text-center font-bold mt-2 min-h-[20px]";
                } else {
                    errorEl.innerText = "Account successfully created! Redirecting...";
                    errorEl.className = "text-sm text-green-500 text-center font-bold mt-2 min-h-[20px]";

                    // Auto-redirect to the main PMO app after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '../index';
                    }, 1500);
                }
            }
        };

        // Auto-detect dark mode preference for the background
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>

</html>
